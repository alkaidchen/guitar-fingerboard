<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎸</text></svg>">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="manifest" href="/manifest.json">
<title>吉他指板学习</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --accent: #e94560;
    --wrong: #e74c3c;
    --fret-wire: #c0c0c0;
    --string-color: #d4a574;
    --nut-color: #f0e6d3;
    --input-bg: rgba(255, 255, 255, 0.1);
    --cell-width: clamp(44px, 6.8vw, 74px);
    --cell-height: clamp(30px, 4.2vw, 46px);
    --font-size: clamp(10px, 1.8vw, 16px);
    --dot-size: clamp(7px, 1.1vw, 13px);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
  }

  h1 {
    font-size: clamp(1.2rem, 4vw, 2rem);
    margin-bottom: 0.8rem;
    letter-spacing: 0.05em;
    color: #fff;
  }

  .toolbar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .toolbar button {
    padding: 0.5em 1.4em;
    border: none;
    border-radius: 6px;
    font-size: clamp(0.8rem, 2vw, 1rem);
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.1s, box-shadow 0.2s;
  }

  .toolbar button:active { transform: scale(0.96); }

  .btn-reset { background: #e74c3c; color: #fff; }
  .btn-hint  { background: #3498db; color: #fff; }
  .btn-hint.active { background: #e67e22; }
  .btn-mode  { background: #9b59b6; color: #fff; }
  .btn-challenge { background: #27ae60; color: #fff; }
  .btn-challenge.active { background: #f39c12; }

  .fingerboard-wrapper {
    width: 100%;
    max-width: 1020px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 0.5rem;
  }

  .fingerboard {
    display: grid;
    grid-template-columns: repeat(13, var(--cell-width));
    grid-template-rows: repeat(6, var(--cell-height));
    gap: 0;
    min-width: fit-content;
    margin: 0 auto;
  }

  .fret-cell {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border-right: 2px solid var(--fret-wire);
  }

  .fret-cell::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 2px;
    transform: translateY(-50%);
    background: var(--string-color);
    opacity: 0.5;
    z-index: 0;
  }

  .fret-cell.open-cell {
    border-right: 4px solid var(--nut-color);
    background: rgba(240, 230, 211, 0.05);
  }

  .fret-cell.open-cell::before {
    display: none;
  }

  .fret-cell.dot-mark {
    z-index: 1;
  }

  .fret-cell.dot-mark::after {
    content: '';
    position: absolute;
    width: var(--dot-size);
    height: var(--dot-size);
    border-radius: 50%;
    background: #ede8dc;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.12), 0 0 5px rgba(237,232,220,0.25);
    bottom: calc(-0.5 * var(--dot-size));
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 5;
  }

  .note-cell {
    width: 85%;
    height: 70%;
    border: 2px solid rgba(255, 255, 255, 0.45);
    border-radius: 4px;
    background: var(--input-bg);
    color: #fff;
    text-align: center;
    font-size: var(--font-size);
    font-weight: 600;
    outline: none;
    position: relative;
    z-index: 1;
    opacity: 0.35;
    transition: border-color 0.2s, background-color 0.2s, opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }

  .note-cell:focus {
    opacity: 1;
    border-color: #fff;
    background: rgba(255, 255, 255, 0.15);
  }

  .note-cell.selected {
    opacity: 1;
    border-color: #fff;
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
  }

  .note-cell.has-value {
    opacity: 1;
  }

  .note-cell.wrong {
    opacity: 1;
    border-color: var(--wrong);
    background: rgba(231, 76, 60, 0.2);
    color: #f7a9a2;
  }

  .note-cell.correct-flash {
    opacity: 1;
    border-color: #2ecc71;
    background: rgba(46, 204, 113, 0.25);
    color: #2ecc71;
    transition: none;
  }

  .note-cell.challenge-target {
    opacity: 1;
    border-color: #f1c40f;
    background: rgba(241, 196, 15, 0.2);
    box-shadow: 0 0 12px rgba(241, 196, 15, 0.5);
    animation: challengePulse 1.2s ease-in-out infinite;
  }

  @keyframes challengePulse {
    0%, 100% { box-shadow: 0 0 6px rgba(241, 196, 15, 0.3); }
    50% { box-shadow: 0 0 16px rgba(241, 196, 15, 0.7); }
  }

  .note-cell.hint-shown {
    opacity: 1;
    border-color: #e67e22;
    background: rgba(230, 126, 34, 0.15);
    color: #e67e22;
  }

  /* ---- Note Picker (bottom sheet) ---- */
  .note-picker-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 100;
    justify-content: center;
    align-items: flex-end;
  }

  .note-picker-overlay.active {
    display: flex;
  }

  .note-picker {
    width: 100%;
    max-width: 480px;
    background: #1e2a4a;
    border-radius: 16px 16px 0 0;
    padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom, 0px));
    animation: pickerSlideUp 0.22s ease-out;
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
  }

  @keyframes pickerSlideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .picker-section-label {
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 0.35rem;
    margin-top: 0.5rem;
  }

  .picker-section-label:first-child {
    margin-top: 0;
  }

  .picker-notes {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.4rem;
  }

  .picker-notes.accidentals {
    grid-template-columns: repeat(5, 1fr);
    margin-top: 0.1rem;
  }

  .note-btn {
    height: 46px;
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .note-btn:active {
    transform: scale(0.9);
    background: var(--accent);
    border-color: var(--accent);
  }

  .note-btn.accidental {
    border-color: rgba(233, 69, 96, 0.4);
    color: #f0707e;
    font-size: 0.95rem;
  }

  .note-btn.accidental:active {
    background: var(--accent);
    color: #fff;
  }

  .picker-clear {
    width: 100%;
    height: 38px;
    margin-top: 0.5rem;
    border: 2px solid rgba(231, 76, 60, 0.35);
    border-radius: 8px;
    background: rgba(231, 76, 60, 0.08);
    color: #e74c3c;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .picker-clear:active {
    background: #e74c3c;
    color: #fff;
  }

  /* ---- Portrait warning overlay ---- */
  .portrait-warning {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: #fff;
  }

  .portrait-warning .rotate-icon {
    font-size: 3rem;
    animation: rotateHint 1.5s ease-in-out infinite;
  }

  @keyframes rotateHint {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }

  .portrait-warning p {
    font-size: 1rem;
    color: #888;
  }

  /* ---- Celebration overlay ---- */
  .celebration-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .celebration-overlay.active {
    display: flex;
    animation: celebFadeIn 0.4s ease-out;
  }

  @keyframes celebFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .celebration-overlay .celeb-emoji {
    font-size: 4rem;
    animation: celebBounce 0.6s ease-out;
  }

  @keyframes celebBounce {
    0%   { transform: scale(0) rotate(-20deg); }
    50%  { transform: scale(1.3) rotate(5deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .celebration-overlay .celeb-text {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    animation: celebSlideUp 0.5s ease-out 0.2s both;
  }

  @keyframes celebSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .celebration-overlay .celeb-sub {
    font-size: 0.85rem;
    color: #888;
    animation: celebSlideUp 0.5s ease-out 0.4s both;
  }

  .confetti-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    top: -10px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @media (orientation: portrait) {
    .portrait-warning { display: flex; }
  }

  @media (orientation: landscape) {
    .portrait-warning { display: none !important; }
  }

  .sidebar {
    display: contents;
  }

  .stats {
    margin-top: 1rem;
    font-size: clamp(0.75rem, 2vw, 0.95rem);
    color: #888;
    text-align: center;
  }

  .stats span { font-weight: 700; }
  .stats .green { color: #2ecc71; }
  .stats .red { color: var(--wrong); }

  @media (max-width: 600px) {
    :root {
      --cell-width: clamp(36px, 7.2vw, 52px);
      --cell-height: clamp(26px, 5vw, 38px);
      --font-size: clamp(9px, 2.5vw, 13px);
      --dot-size: clamp(6px, 1.5vw, 10px);
    }
    body { padding: 0.5rem; }
    h1 { margin-bottom: 0.3rem; }
  }

  @media (max-width: 600px) and (orientation: portrait) {
    :root {
      --cell-width: clamp(32px, 7vw, 46px);
      --cell-height: clamp(24px, 4.5vw, 34px);
      --font-size: clamp(8px, 2.2vw, 12px);
    }
  }

  @media (min-width: 601px) and (max-width: 1024px) {
    :root {
      --cell-width: clamp(44px, 7vw, 68px);
      --cell-height: clamp(30px, 4.5vw, 46px);
      --font-size: clamp(11px, 1.8vw, 15px);
    }
  }

  /* ---- Landscape (mobile): top bar + fingerboard ---- */
  @media (orientation: landscape) and (max-height: 600px) {
    :root {
      --pad: 0.25rem;
      --topbar-h: 36px;
      --topbar-gap: 0.4rem;
      --cell-width: calc((100vw - 2 * var(--pad)) / 13);
      --cell-height: calc(var(--cell-width) * 0.55);
      --font-size: clamp(10px, 2vw, 15px);
      --dot-size: clamp(6px, 1vw, 12px);
    }

    body {
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      padding: var(--pad);
      gap: 0;
    }

    h1 { display: none; }

    .sidebar {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: var(--topbar-h);
      flex-shrink: 0;
      margin-bottom: var(--topbar-gap);
    }

    .toolbar {
      flex-direction: row;
      gap: 0.4rem;
      margin-bottom: 0;
    }

    .toolbar button {
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 8px;
      font-size: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-mode::before  { content: '♮'; font-size: 1.1rem; }
    .btn-mode.all-mode::before { content: '♯'; }
    .btn-reset::before { content: '↺'; font-size: 1.1rem; }
    .btn-hint::before  { content: '?'; font-size: 1.1rem; font-weight: 700; }
    .btn-hint.active::before { content: '✕'; }
    .btn-challenge::before { content: '🎯'; font-size: 1rem; }
    .btn-challenge.active::before { content: '⏹'; }

    .fingerboard-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding-bottom: 0;
    }

    .fingerboard {
      min-width: 0;
    }

    .stats {
      margin-top: 0;
      font-size: 0.85rem;
      line-height: var(--topbar-h);
      white-space: nowrap;
    }

    .note-picker-overlay {
      align-items: center;
    }

    .note-picker {
      border-radius: 12px;
      max-width: 360px;
      animation: pickerFadeIn 0.2s ease-out;
    }

    @keyframes pickerFadeIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
  }
</style>
</head>
<body>

<div class="celebration-overlay" id="celebrationOverlay">
  <div class="confetti-container" id="confettiContainer"></div>
  <div class="celeb-emoji">🎉</div>
  <div class="celeb-text">全部正确！</div>
  <div class="celeb-sub">点击任意位置关闭</div>
</div>

<div class="portrait-warning">
  <div class="rotate-icon">📱</div>
  <p>请旋转设备至横屏使用</p>
</div>

<h1>吉他指板学习</h1>

<div class="sidebar">
  <div class="toolbar">
    <button class="btn-mode" id="btnMode">自然音级</button>
    <button class="btn-reset" id="btnReset">重置</button>
    <button class="btn-hint" id="btnHint">提示</button>
    <button class="btn-challenge" id="btnChallenge">挑战</button>
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="fingerboard-wrapper">
  <div class="fingerboard" id="fingerboard"></div>
</div>

<div class="note-picker-overlay" id="notePickerOverlay">
  <div class="note-picker" id="notePicker">
    <div id="pickerBody"></div>
    <button class="picker-clear" id="pickerClear">清除</button>
  </div>
</div>

<script>
  const STRINGS = [
    { notes: ['E','F','F#','G','G#','A','A#','B','C','C#','D','D#','E'] },
    { notes: ['B','C','C#','D','D#','E','F','F#','G','G#','A','A#','B'] },
    { notes: ['G','G#','A','A#','B','C','C#','D','D#','E','F','F#','G'] },
    { notes: ['D','D#','E','F','F#','G','G#','A','A#','B','C','C#','D'] },
    { notes: ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#','A'] },
    { notes: ['E','F','F#','G','G#','A','A#','B','C','C#','D','D#','E'] },
  ];

  const NATURAL_NOTES = new Set(['C','D','E','F','G','A','B']);
  const NATURAL_LIST  = ['C','D','E','F','G','A','B'];
  const SHARP_LIST    = ['C#','D#','F#','G#','A#'];
  const FLAT_LIST     = ['Db','Eb','Gb','Ab','Bb'];
  const COLS_PER_ROW  = 13;
  const SINGLE_DOT_FRETS = [3, 5, 7, 9];
  const DOUBLE_DOT_FRET  = 12;

  const board        = document.getElementById('fingerboard');
  const btnReset     = document.getElementById('btnReset');
  const btnHint      = document.getElementById('btnHint');
  const btnMode      = document.getElementById('btnMode');
  const btnChallenge = document.getElementById('btnChallenge');
  const statsEl      = document.getElementById('stats');
  const overlay      = document.getElementById('notePickerOverlay');
  const pickerBody   = document.getElementById('pickerBody');
  const pickerClear  = document.getElementById('pickerClear');

  let hintActive = false;
  let mode = 'natural';
  const userValues = {};
  let selectedCell = null;
  let challengeActive = false;
  let challengeCell = null;

  function isNatural(si, fi) {
    return NATURAL_NOTES.has(STRINGS[si].notes[fi]);
  }

  function isRelevant(si, fi) {
    return mode === 'all' || isNatural(si, fi);
  }

  function getTotal() {
    let count = 0;
    STRINGS.forEach((_, si) => {
      for (let fi = 0; fi < COLS_PER_ROW; fi++) {
        if (isRelevant(si, fi)) count++;
      }
    });
    return count;
  }

  function getCellValue(el) {
    return el.dataset.value || '';
  }

  function setCellValue(el, val) {
    el.dataset.value = val;
    el.textContent = val;
  }

  function buildBoard() {
    board.innerHTML = '';

    STRINGS.forEach((_, si) => {
      for (let fi = 0; fi < COLS_PER_ROW; fi++) {
        const cell = document.createElement('div');
        cell.className = 'fret-cell';

        if (fi === 0) cell.classList.add('open-cell');

        if (SINGLE_DOT_FRETS.includes(fi) && si === 2) {
          cell.classList.add('dot-mark');
        }
        if (fi === DOUBLE_DOT_FRET && (si === 1 || si === 3)) {
          cell.classList.add('dot-mark');
        }

        const noteCell = document.createElement('div');
        noteCell.className = 'note-cell';
        noteCell.tabIndex = 0;
        noteCell.dataset.string = si;
        noteCell.dataset.fret = fi;
        noteCell.dataset.value = '';

        noteCell.addEventListener('click', onCellClick);
        noteCell.addEventListener('keydown', onKeyDown);

        cell.appendChild(noteCell);
        board.appendChild(cell);
      }
    });

    updateStats();
  }

  function normalize(val) {
    return val.trim().replace(/♯|＃/g, '#').replace(/♭/g, 'b');
  }

  function isCorrect(si, fi, value) {
    const correct = STRINGS[si].notes[fi].toUpperCase();
    const v = normalize(value).toUpperCase();
    if (v === correct) return true;
    const enharmonic = {
      'C#': 'DB', 'D#': 'EB', 'F#': 'GB', 'G#': 'AB', 'A#': 'BB',
      'DB': 'C#', 'EB': 'D#', 'GB': 'F#', 'AB': 'G#', 'BB': 'A#',
    };
    return enharmonic[v] === correct || enharmonic[correct] === v;
  }

  /* ---- Picker ---- */

  function onCellClick(e) {
    if (hintActive) return;
    const el = e.currentTarget;
    const si = +el.dataset.string;
    const fi = +el.dataset.fret;
    if (challengeActive) {
      if (!challengeCell || challengeCell.si !== si || challengeCell.fi !== fi) return;
    }
    openPicker(si, fi, el);
  }

  function openPicker(si, fi, el) {
    if (selectedCell && selectedCell.el) {
      selectedCell.el.classList.remove('selected');
    }

    selectedCell = { si, fi, el };
    el.classList.add('selected');

    pickerBody.innerHTML = '';

    const naturalLabel = document.createElement('div');
    naturalLabel.className = 'picker-section-label';
    naturalLabel.textContent = '自然音';
    pickerBody.appendChild(naturalLabel);

    const naturalGrid = document.createElement('div');
    naturalGrid.className = 'picker-notes';
    NATURAL_LIST.forEach(note => {
      const btn = document.createElement('button');
      btn.className = 'note-btn';
      btn.textContent = note;
      btn.addEventListener('click', () => selectNote(note));
      naturalGrid.appendChild(btn);
    });
    pickerBody.appendChild(naturalGrid);

    if (mode === 'all') {
      const sharpLabel = document.createElement('div');
      sharpLabel.className = 'picker-section-label';
      sharpLabel.textContent = '升号 Sharp';
      pickerBody.appendChild(sharpLabel);

      const sharpGrid = document.createElement('div');
      sharpGrid.className = 'picker-notes accidentals';
      SHARP_LIST.forEach(note => {
        const btn = document.createElement('button');
        btn.className = 'note-btn accidental';
        btn.textContent = note;
        btn.addEventListener('click', () => selectNote(note));
        sharpGrid.appendChild(btn);
      });
      pickerBody.appendChild(sharpGrid);

      const flatLabel = document.createElement('div');
      flatLabel.className = 'picker-section-label';
      flatLabel.textContent = '降号 Flat';
      pickerBody.appendChild(flatLabel);

      const flatGrid = document.createElement('div');
      flatGrid.className = 'picker-notes accidentals';
      FLAT_LIST.forEach(note => {
        const btn = document.createElement('button');
        btn.className = 'note-btn accidental';
        btn.textContent = note;
        btn.addEventListener('click', () => selectNote(note));
        flatGrid.appendChild(btn);
      });
      pickerBody.appendChild(flatGrid);
    }

    overlay.classList.add('active');
  }

  function selectNote(note) {
    if (!selectedCell) return;
    const { si, fi, el } = selectedCell;

    setCellValue(el, note);
    userValues[`${si}-${fi}`] = note;

    el.classList.add('has-value');
    el.classList.remove('wrong', 'correct-flash');

    const correct = isCorrect(si, fi, note);
    if (correct) {
      el.classList.add('correct-flash');
      setTimeout(() => el.classList.remove('correct-flash'), 1000);
    } else {
      el.classList.add('wrong');
    }

    closePicker();
    updateStats();

    if (challengeActive && correct) {
      setTimeout(() => {
        if (challengeActive) highlightNextChallenge();
      }, 300);
    }
  }

  function clearSelectedCell() {
    if (!selectedCell) return;
    const { si, fi, el } = selectedCell;
    setCellValue(el, '');
    delete userValues[`${si}-${fi}`];
    el.classList.remove('has-value', 'wrong');
    closePicker();
    updateStats();
  }

  function closePicker() {
    overlay.classList.remove('active');
    if (selectedCell && selectedCell.el) {
      selectedCell.el.classList.remove('selected');
      selectedCell.el.focus();
    }
    selectedCell = null;
  }

  /* ---- Keyboard (desktop) ---- */

  function onKeyDown(e) {
    const el = e.target;
    if (!el.classList.contains('note-cell')) return;

    const si = +el.dataset.string;
    const fi = +el.dataset.fret;
    const allCells = [...board.querySelectorAll('.note-cell')];
    const idx = si * COLS_PER_ROW + fi;
    let nextIdx = -1;

    if (e.key === 'ArrowRight' || (e.key === 'Tab' && !e.shiftKey)) {
      e.preventDefault();
      nextIdx = (idx + 1) % allCells.length;
    } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
      e.preventDefault();
      nextIdx = (idx - 1 + allCells.length) % allCells.length;
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      nextIdx = idx + COLS_PER_ROW < allCells.length ? idx + COLS_PER_ROW : idx;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      nextIdx = idx - COLS_PER_ROW >= 0 ? idx - COLS_PER_ROW : idx;
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (!hintActive) openPicker(si, fi, el);
      return;
    } else if (e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
      if (!hintActive) {
        setCellValue(el, '');
        delete userValues[`${si}-${fi}`];
        el.classList.remove('has-value', 'wrong');
        updateStats();
      }
      return;
    }

    const letter = e.key.toUpperCase();
    if ('CDEFGAB'.includes(letter) && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      if (!hintActive) {
        setCellValue(el, letter);
        userValues[`${si}-${fi}`] = letter;
        el.classList.add('has-value');
        el.classList.remove('wrong');
        if (!isCorrect(si, fi, letter)) {
          el.classList.add('wrong');
        }
        updateStats();
      }
      return;
    }

    if (e.key === '#' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      if (!hintActive) {
        const cur = getCellValue(el);
        if (cur.length === 1 && 'CDEFGAB'.includes(cur.toUpperCase())) {
          const newVal = cur + '#';
          setCellValue(el, newVal);
          userValues[`${si}-${fi}`] = newVal;
          el.classList.remove('wrong');
          if (!isCorrect(si, fi, newVal)) {
            el.classList.add('wrong');
          }
          updateStats();
        }
      }
      return;
    }

    if (nextIdx >= 0 && nextIdx < allCells.length) {
      allCells[nextIdx].focus();
    }
  }

  /* ---- Board actions ---- */

  function resetBoard() {
    if (challengeActive) toggleChallenge();
    board.querySelectorAll('.note-cell').forEach(el => {
      setCellValue(el, '');
      el.classList.remove('wrong', 'hint-shown', 'has-value', 'selected', 'correct-flash', 'challenge-target');
    });
    Object.keys(userValues).forEach(k => delete userValues[k]);
    hintActive = false;
    celebrationShown = false;
    btnHint.classList.remove('active');
    btnHint.textContent = '提示';
    updateStats();
  }

  function toggleHint() {
    hintActive = !hintActive;
    const cells = board.querySelectorAll('.note-cell');

    if (hintActive) {
      btnHint.classList.add('active');
      btnHint.textContent = '取消提示';
      cells.forEach(el => {
        const si = +el.dataset.string;
        const fi = +el.dataset.fret;
        const key = `${si}-${fi}`;
        if (!(key in userValues)) userValues[key] = getCellValue(el);

        if (isRelevant(si, fi)) {
          setCellValue(el, STRINGS[si].notes[fi]);
          el.classList.remove('wrong', 'has-value');
          el.classList.add('hint-shown');
        } else {
          el.classList.remove('wrong', 'has-value', 'hint-shown');
        }
      });
    } else {
      btnHint.classList.remove('active');
      btnHint.textContent = '提示';
      cells.forEach(el => {
        const si = +el.dataset.string;
        const fi = +el.dataset.fret;
        const key = `${si}-${fi}`;
        const saved = userValues[key] || '';
        setCellValue(el, saved);
        el.classList.remove('hint-shown');

        const hasVal = saved.trim() !== '';
        el.classList.toggle('has-value', hasVal);
        el.classList.remove('wrong');
        if (hasVal && !isCorrect(si, fi, saved)) {
          el.classList.add('wrong');
        }
      });
    }
    updateStats();
  }

  function toggleMode() {
    if (challengeActive) toggleChallenge();
    mode = mode === 'natural' ? 'all' : 'natural';
    btnMode.textContent = mode === 'natural' ? '自然音级' : '衍生音级';
    btnMode.classList.toggle('all-mode', mode === 'all');

    if (hintActive) {
      toggleHint();
    }

    updateStats();
  }

  let celebrationShown = false;

  function updateStats() {
    const cells = board.querySelectorAll('.note-cell');
    let correct = 0;
    const total = getTotal();

    cells.forEach(el => {
      const si = +el.dataset.string;
      const fi = +el.dataset.fret;
      if (!isRelevant(si, fi)) return;

      const val = hintActive ? (userValues[`${si}-${fi}`] || '') : getCellValue(el);
      if (val.trim() !== '' && isCorrect(si, fi, val)) correct++;
    });
    statsEl.innerHTML = `<span class="green">${correct}</span> / ${total}`;

    if (correct === total && total > 0 && !hintActive && !celebrationShown) {
      celebrationShown = true;
      setTimeout(() => showCelebration(), 600);
    }
    if (correct < total) {
      celebrationShown = false;
    }
  }

  function showCelebration() {
    const overlay = document.getElementById('celebrationOverlay');
    const container = document.getElementById('confettiContainer');
    container.innerHTML = '';

    const colors = ['#e94560', '#2ecc71', '#3498db', '#f1c40f', '#9b59b6', '#e67e22', '#1abc9c'];
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      piece.style.animationDelay = Math.random() * 1.5 + 's';
      piece.style.width = (5 + Math.random() * 6) + 'px';
      piece.style.height = (5 + Math.random() * 6) + 'px';
      container.appendChild(piece);
    }

    overlay.classList.add('active');
  }

  function hideCelebration() {
    document.getElementById('celebrationOverlay').classList.remove('active');
  }

  document.getElementById('celebrationOverlay').addEventListener('click', hideCelebration);

  /* ---- Challenge mode ---- */

  function toggleChallenge() {
    challengeActive = !challengeActive;

    if (challengeActive) {
      btnChallenge.classList.add('active');
      btnChallenge.textContent = '退出挑战';
      highlightNextChallenge();
    } else {
      btnChallenge.classList.remove('active');
      btnChallenge.textContent = '挑战';
      if (challengeCell) {
        const cell = board.querySelector(`.note-cell[data-string="${challengeCell.si}"][data-fret="${challengeCell.fi}"]`);
        if (cell) cell.classList.remove('challenge-target');
      }
      challengeCell = null;
    }
  }

  function highlightNextChallenge() {
    if (challengeCell) {
      const prev = board.querySelector(`.note-cell[data-string="${challengeCell.si}"][data-fret="${challengeCell.fi}"]`);
      if (prev) prev.classList.remove('challenge-target');
    }

    const candidates = [];
    board.querySelectorAll('.note-cell').forEach(el => {
      const si = +el.dataset.string;
      const fi = +el.dataset.fret;
      if (!isRelevant(si, fi)) return;
      const val = getCellValue(el);
      if (val.trim() === '' || !isCorrect(si, fi, val)) {
        candidates.push({ si, fi, el });
      }
    });

    if (candidates.length === 0) {
      toggleChallenge();
      return;
    }

    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    challengeCell = pick;
    pick.el.classList.add('challenge-target');
    pick.el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  }

  pickerClear.addEventListener('click', clearSelectedCell);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closePicker();
  });

  btnReset.addEventListener('click', resetBoard);
  btnHint.addEventListener('click', toggleHint);
  btnMode.addEventListener('click', toggleMode);
  btnChallenge.addEventListener('click', toggleChallenge);
  buildBoard();

  screen.orientation?.lock?.('landscape').catch(() => {});
</script>
</body>
</html>
